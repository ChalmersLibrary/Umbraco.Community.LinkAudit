name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Umbraco.Community.LinkAudit.slnx

      - name: Build
        run: dotnet build Umbraco.Community.LinkAudit.slnx --configuration Release --no-restore

      - name: Pack
        run: >
          dotnet pack src/Umbraco.Community.LinkAudit/Umbraco.Community.LinkAudit.csproj
          --configuration Release
          --no-build
          --output artifacts
          -p:Version=${GITHUB_REF_NAME#v}

      - name: NuGet login (OIDC -> temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: rolfis

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "artifacts/*.nupkg"
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
